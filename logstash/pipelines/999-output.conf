input { pipeline { address => "output" } }

filter {
  if ![case_id]     { mutate { add_field => { "case_id"     => "unknown" } } }
  if ![source_type] { mutate { add_field => { "source_type" => "unknown" } } }

  # ------------------------------------------------------------------
  # Make the deterministic _id visible/searchable/exportable in OSD
  # (OSD can't visualize _id, so we mirror @metadata.doc_id)
  # ------------------------------------------------------------------
  if [@metadata][doc_id] {
    mutate {
      add_field => {
        "document_id" => "%{[@metadata][doc_id]}"
      }
    }
  }

  # Build Add_Enrichment once we know doc_id and (optionally) target_index
  if !([source_type] in ["case-manifest","host-manifest","artefacts-manifest"]) and [@metadata][doc_id] {
    if [@metadata][target_index] {
      mutate {
        add_field => {
          "Add_Enrichment" =>
            "http://127.0.0.1/enrich?case_id=%{case_id}&index=%{[@metadata][target_index]}&id=%{[@metadata][doc_id]}"
        }
      }
    } else {
      # Fallback: same format as the non-routed output branch
      mutate {
        add_field => {
          "Add_Enrichment" =>
            "http://127.0.0.1/enrich?case_id=%{case_id}&index=%{source_type}-%{+YYYY.MM}&id=%{[@metadata][doc_id]}"
        }
      }
    }
  }

  # ------------------------------------------------------------------
  # NEW: derive per-timezone timestamps from final @timestamp
  # ------------------------------------------------------------------
  ruby {
    code => '
      tzs = event.get("timezones")
      t   = event.get("@timestamp")

      # Only proceed if we have both @timestamp and a timezone list
      return unless t && tzs.is_a?(Array) && !tzs.empty?

      base = t.time

      # Map normalized timezone (uppercase) -> offset
      offsets = {
        # Neutral / base
        "UTC"  => "+00:00",
        "GMT"  => "+00:00",

        # Australia / NZ
        "AEDT" => "+11:00",
        "AEST" => "+10:00",
        "ACST" => "+09:30",
        "ACDT" => "+10:30",
        "AWST" => "+08:00",
        "NZST" => "+12:00",
        "NZDT" => "+13:00",

        # North America
        "EST"  => "-05:00",
        "EDT"  => "-04:00",
        "CST"  => "-06:00",
        "CDT"  => "-05:00",
        "MST"  => "-07:00",
        "MDT"  => "-06:00",
        "PST"  => "-08:00",
        "PDT"  => "-07:00",
        "AKST" => "-09:00",
        "AKDT" => "-08:00",
        "HST"  => "-10:00",

        # Europe / UK
        "WET"  => "+00:00",
        "WEST" => "+01:00",
        "BST"  => "+01:00",
        "CET"  => "+01:00",
        "CEST" => "+02:00",
        "EET"  => "+02:00",
        "EEST" => "+03:00",
        "MSK"  => "+03:00",

        # Asia / Middle East
        "IST"  => "+05:30",
        "PKT"  => "+05:00",
        "WIB"  => "+07:00",
        "WITA" => "+08:00",
        "WIT"  => "+09:00",
        "JST"  => "+09:00",
        "KST"  => "+09:00",
        "HKT"  => "+08:00",
        "SGT"  => "+08:00",
        "PHT"  => "+08:00"
      }

      tzs.each do |tz|
        # Normalize input (case-insensitive)
        tz_norm = tz.to_s.strip.upcase

        offset = offsets[tz_norm]
        next unless offset

        # Field name ALWAYS uppercase, regardless of input format
        field_name = "timestamp_#{tz_norm}"

        # Avoid overwriting
        next if event.get(field_name)

        local_time = base.getlocal(offset)

        # Display output timezone ALWAYS uppercase
        display = local_time.strftime("%Y-%m-%d %H:%M:%S.%3N")

        # Store as STRING (so OSD does not parse as date)
        event.set(field_name, display)
      end
    '
  }

  # ------------------------------------------------------------------
  # Cleanup: drop empty tags arrays so OSD treats them as "no tags"
  # ------------------------------------------------------------------
  ruby {
    code => '
      tags = event.get("tags")
      if tags.is_a?(Array) && tags.empty?
        event.remove("tags")
      end
    '
  }
}

output {
  if [@metadata][target_index] {
    opensearch {
      hosts             => [ "${OS_HOST}" ]
      user              => "${OS_USER}"
      password          => "${OS_PASS}"
      ecs_compatibility => v1
      index             => "%{[@metadata][target_index]}"
      document_id       => "%{[@metadata][doc_id]}"
      action            => "index"
      ssl               => true
      cacert            => "${OS_CACERT}"
      manage_template   => false
      timeout           => 60
    }
  } else {
    opensearch {
      hosts             => [ "${OS_HOST}" ]
      user              => "${OS_USER}"
      password          => "${OS_PASS}"
      ecs_compatibility => v1
      index             => "%{source_type}-%{+YYYY.MM}"
      document_id       => "%{[@metadata][doc_id]}"
      action            => "index"
      ssl               => true
      cacert            => "${OS_CACERT}"
      manage_template   => false
      timeout           => 60
    }
  }

  # Optional debug:
  # stdout { codec => rubydebug }
}
