input { pipeline { address => "output" } }

filter {
  if ![case_id]     { mutate { add_field => { "case_id"     => "unknown" } } }
  if ![source_type] { mutate { add_field => { "source_type" => "unknown" } } }

  # ------------------------------------------------------------------
  # Make the deterministic _id visible/searchable/exportable in OSD
  # (OSD can't visualize _id, so we mirror @metadata.doc_id)
  # ------------------------------------------------------------------
  if [@metadata][doc_id] {
    mutate {
      add_field => {
        "document_id" => "%{[@metadata][doc_id]}"
      }
    }
  }

  # Build Add_Enrichment once we know doc_id and (optionally) target_index
  if !([source_type] in ["case-manifest","host-manifest","artefacts-manifest"]) and [@metadata][doc_id] {
    if [@metadata][target_index] {
      mutate {
        add_field => {
          "Add_Enrichment" =>
            "case_id=%{case_id}&index=%{[@metadata][target_index]}&id=%{[@metadata][doc_id]}"
        }
      }
    } else {
      # Fallback: same format as the non-routed output branch
      mutate {
        add_field => {
          "Add_Enrichment" =>
            "case_id=%{case_id}&index=%{source_type}-%{+YYYY.MM}&id=%{[@metadata][doc_id]}"
        }
      }
    }
  }

  # ------------------------------------------------------------------
  # NEW: Curate event.summary from columns.yml
  #
  # - Uses /etc/recursive-ir/opensearch-dashboards/columns.yml
  # - Picks types.<source_type>.default_columns
  # - Builds event.summary as "Field=value | Field=value | ..."
  # - Caches YAML and reloads only when file changes
  # ------------------------------------------------------------------
  ruby {
    code => '
      require "yaml"

      # ---- config ----
      path = "/etc/recursive-ir/opensearch-dashboards/columns.yml"
      max_fields = 6  # tune: how many fields to include in summary

      # fields we never want in summary (even if in columns.yml)
      skip = {
        "tags" => true,
        "event.comments.last" => true,
        "event.comments.count" => true,
        "event.comments.history" => true,
        "Add_Enrichment" => true,
        "document_id" => true,
        "case_id" => true,
        "source_type" => true,
        "@timestamp" => true,
        "event_summary" => true,

      }

      # Convert dotted field path (OSD style) into Logstash fieldref
      # "Event.System.EventID" => "[Event][System][EventID]"
      def dotted_to_ref(s)
        s = s.to_s.strip
        return "" if s.empty?
        # already fieldref?
        return s if s.start_with?("[") && s.include?("]")
        parts = s.split(".").map { |p| p.strip }.reject(&:empty?)
        parts.map { |p| "[#{p}]" }.join
      end

      # Format values compactly
      def fmt(v)
        return nil if v.nil?
        if v.is_a?(Array)
          v = v.compact
          return nil if v.empty?
          return v.first.to_s if v.length == 1
          # keep it short
          return v.take(3).map(&:to_s).join(", ") + (v.length > 3 ? "…" : "")
        end
        if v.is_a?(Hash)
          # too big / noisy; skip
          return nil
        end
        s = v.to_s
        s = s.gsub(/\s+/, " ").strip
        return nil if s.empty?
        # trim long strings
        return s.length > 120 ? (s[0,117] + "…") : s
      end

      # ---- cached load of columns.yml ----
      begin
        mtime = File.exist?(path) ? File.mtime(path).to_i : 0

        @@ri_cols_cache ||= nil
        @@ri_cols_mtime ||= 0

        if @@ri_cols_cache.nil? || mtime > @@ri_cols_mtime
          raw = File.read(path)
          y = YAML.safe_load(raw) rescue YAML.load(raw)
          @@ri_cols_cache = y.is_a?(Hash) ? y : {}
          @@ri_cols_mtime = mtime
        end

        cols = @@ri_cols_cache
      rescue => e
        cols = {}
      end

      st = event.get("source_type").to_s.strip
      st = "unknown" if st.empty?

      # Pull default_columns for this source_type
      types = cols.is_a?(Hash) ? (cols["types"] || {}) : {}
      entry = types.is_a?(Hash) ? (types[st] || {}) : {}
      default_cols = entry.is_a?(Hash) ? (entry["default_columns"] || []) : []
      default_cols = [] unless default_cols.is_a?(Array)

      # Build summary segments
      segs = []
      default_cols.each do |field|
        f = field.to_s.strip
        next if f.empty?
        next if skip[f]

        ref = dotted_to_ref(f)
        next if ref.empty?

        v = event.get(ref)
        s = fmt(v)
        next if s.nil?

        # Use full field path as label
        label = f.to_s.strip
        segs << "#{label}=#{s}"
        break if segs.length >= max_fields

      end

      # Fallbacks if columns.yml yields nothing useful
      if segs.empty?
        fallback = [
          "event.blob_preview.event_original"
        ]
        fallback.each do |f|
          ref = dotted_to_ref(f)
          v = event.get(ref)
          s = fmt(v)
          next if s.nil?
        
          label = f.to_s          # ✅ full field name, not last token
          segs << "#{label}=#{s}"
          break if segs.length >= 3
        end
      end

      summary = segs.join(" | ")
      if !summary.to_s.empty?
        # write under [event][summary]
        event.set("event_summary", summary) 
      end
    '
  }

  # ------------------------------------------------------------------
  # NEW: derive per-timezone timestamps from final @timestamp
  # ------------------------------------------------------------------
  ruby {
    code => '
      tzs = event.get("timezones")
      t   = event.get("@timestamp")

      return unless t && tzs.is_a?(Array) && !tzs.empty?

      base = t.time.utc

      offsets = {
        "UTC"  => "+00:00",
        "GMT"  => "+00:00",

        "AEDT" => "+11:00",
        "AEST" => "+10:00",
        "ACST" => "+09:30",
        "ACDT" => "+10:30",
        "AWST" => "+08:00",
        "NZST" => "+12:00",
        "NZDT" => "+13:00",

        "EST"  => "-05:00",
        "EDT"  => "-04:00",
        "CST"  => "-06:00",
        "CDT"  => "-05:00",
        "MST"  => "-07:00",
        "MDT"  => "-06:00",
        "PST"  => "-08:00",
        "PDT"  => "-07:00",
        "AKST" => "-09:00",
        "AKDT" => "-08:00",
        "HST"  => "-10:00",

        "WET"  => "+00:00",
        "WEST" => "+01:00",
        "BST"  => "+01:00",
        "CET"  => "+01:00",
        "CEST" => "+02:00",
        "EET"  => "+02:00",
        "EEST" => "+03:00",
        "MSK"  => "+03:00",

        "IST"  => "+05:30",
        "PKT"  => "+05:00",
        "WIB"  => "+07:00",
        "WITA" => "+08:00",
        "WIT"  => "+09:00",
        "JST"  => "+09:00",
        "KST"  => "+09:00",
        "HKT"  => "+08:00",
        "SGT"  => "+08:00",
        "PHT"  => "+08:00"
      }

      tzs.each do |tz|
        tz_norm = tz.to_s.strip.upcase
        offset  = offsets[tz_norm]
        next unless offset

        field_name = "timestamp_#{tz_norm}"

        existing = event.get(field_name)
        if existing && tz_norm != "UTC" && tz_norm != "GMT" && existing.to_s.end_with?("+00:00")
          # allow overwrite of previously-wrong UTC-looking values
        elsif existing
          next
        end

        local_time = base.getlocal(offset)

        # IMPORTANT: do NOT .utc here, or you undo the offset
        display = base.getlocal(offset).strftime("%Y-%m-%d %H:%M:%S")

        event.set(field_name, display)
      end
    '
  }

  # ------------------------------------------------------------------
  # Cleanup: drop empty tags arrays so OSD treats them as "no tags"
  # ------------------------------------------------------------------
  ruby {
    code => '
      tags = event.get("tags")
      if tags.is_a?(Array) && tags.empty?
        event.remove("tags")
      end
    '
  }
}

output {
  if [@metadata][target_index] {
    opensearch {
      hosts             => [ "${OS_HOST}" ]
      user              => "${OS_USER}"
      password          => "${OS_PASS}"
      ecs_compatibility => v1
      index             => "%{[@metadata][target_index]}"
      document_id       => "%{[@metadata][doc_id]}"
      action            => "index"
      ssl               => true
      cacert            => "${OS_CACERT}"
      manage_template   => false
      timeout           => 60
    }
  } else {
    opensearch {
      hosts             => [ "${OS_HOST}" ]
      user              => "${OS_USER}"
      password          => "${OS_PASS}"
      ecs_compatibility => v1
      index             => "%{source_type}-%{+YYYY.MM}"
      document_id       => "%{[@metadata][doc_id]}"
      action            => "index"
      ssl               => true
      cacert            => "${OS_CACERT}"
      manage_template   => false
      timeout           => 60
    }
  }

  # Optional debug:
  # stdout { codec => rubydebug }
}
