        event.tag("rb_generic_stringify_ok") if ENV["VERBOSE"] == "1" && stringify_any
        event.tag("rb_generic_numeric_ok")   if ENV["VERBOSE"] == "1" && numeric_enabled && numeric_any
        event.tag("rb_generic_sanitizer_ok") if ENV["VERBOSE"] == "1" && (stringify_any || numeric_any)

      rescue => e
        event.tag("rb_generic_sanitizer_fail") if ENV["VERBOSE"] == "1"
        event.set("[rb_generic_sanitizer_error]", e.message.to_s) if ENV["VERBOSE"] == "1"
      end
    '
  }
  #####################################################################
  # 3) GeoIP enrichment (Recursive-IR MMDB)

  # Determine if source/destination IPs are public (no tags, temp fields only)
  ruby {
    code => '
      require "ipaddr"

      # sanitize an ECS ip field: keep only real IPs; move junk to *.address
      def sanitize_ip_field(event, ip_path, addr_path)
        v = event.get(ip_path)
        v = v[0] if v.is_a?(Array) && !v.empty?
        return unless v.is_a?(String)

        s = v.strip
        if s.empty? || s =~ /\A(unknown|n\/a|-)\z/i
          event.remove(ip_path)
          event.set(addr_path, s) if !s.empty?
          return
        end

        begin
          IPAddr.new(s) # validates
        rescue
          event.remove(ip_path)
          event.set(addr_path, s)
        end
      end

      sanitize_ip_field(event, "[source][ip]",      "[source][address]")
      sanitize_ip_field(event, "[destination][ip]", "[destination][address]")

      # true only for globally routable (public) IPs
      def public_ip?(addr)
        return false unless addr.is_a?(IPAddr)

        if addr.ipv4?
          return false if addr.loopback?                          # 127.0.0.0/8
          return false if addr.link_local?                        # 169.254.0.0/16
          return false if addr.private?                           # 10/8, 172.16/12, 192.168/16
          return false if IPAddr.new("100.64.0.0/10").include?(addr) # CGNAT
          return false if IPAddr.new("224.0.0.0/4").include?(addr)   # multicast
          return false if IPAddr.new("240.0.0.0/4").include?(addr)   # reserved
          return true
        else
          # IPv6
          return false if addr.loopback?                          # ::1/128
          return false if addr == IPAddr.new("::")               # unspecified
          return false if addr.link_local?                        # fe80::/10
          return false if addr.multicast?                         # ff00::/8
          return false if IPAddr.new("fc00::/7").include?(addr)  # ULA
          return false if IPAddr.new("fe80::/10").include?(addr) # link-local (belt + braces)
          return false if IPAddr.new("::ffff:0:0/96").include?(addr) # v4-mapped
          return true
        end
      end

      src = event.get("[source][ip]")
      if src.is_a?(String) && !src.empty?
        begin
          event.set("[@metadata][src_is_public_ip]", public_ip?(IPAddr.new(src)))
        rescue
          event.set("[@metadata][src_is_public_ip]", false)
        end
      end

      dst = event.get("[destination][ip]")
      if dst.is_a?(String) && !dst.empty?
        begin
          event.set("[@metadata][dst_is_public_ip]", public_ip?(IPAddr.new(dst)))
        rescue
          event.set("[@metadata][dst_is_public_ip]", false)
        end
      end
    '
  }

  # --- ASN enrichment (Recursive-ASN MMDB) ---
  if [source][ip] and [@metadata][src_is_public_ip] {
    geoip {
      source                 => "[source][ip]"
      target                 => "[source][asn]"
      database               => "/etc/recursive-ir/mmdb/recursive-asn.mmdb"
      default_database_type  => "ASN"
      tag_on_failure         => []
    }
  }

  if [destination][ip] and [@metadata][dst_is_public_ip] {
    geoip {
      source                 => "[destination][ip]"
      target                 => "[destination][asn]"
      database               => "/etc/recursive-ir/mmdb/recursive-asn.mmdb"
      default_database_type  => "ASN"
      tag_on_failure         => []
    }
  }

  # --- Country enrichment (Recursive-Country MMDB) ---
  if [source][ip] and [@metadata][src_is_public_ip] {
    geoip {
      source   => "[source][ip]"
      target   => "[source][geo]"
      database => "/etc/recursive-ir/mmdb/recursive-country.mmdb"
      tag_on_failure => []
    }
  }

  if [destination][ip] and [@metadata][dst_is_public_ip] {
    geoip {
      source   => "[destination][ip]"
      target   => "[destination][geo]"
      database => "/etc/recursive-ir/mmdb/recursive-country.mmdb"
      tag_on_failure => []
    }
  }

  # Cleanup temp metadata flags (keeps events pristine)
  mutate {
    remove_field => [ "[@metadata][src_is_public_ip]", "[@metadata][dst_is_public_ip]" ]
  }

}

output { pipeline { send_to => "output" } }
