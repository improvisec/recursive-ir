# pipelines.d/998-ingestion-error.conf
# ------------------------------------------------------------
# DLQ -> OpenSearch ("ingestion-error-*")
# Reads failed events from the "output" pipeline DLQ and indexes
# them into a dedicated index for investigation.
#
# Deterministic _id strategy:
#   Primary: parse ORIGINAL failed OpenSearch target index + id from dlq.reason
#            (:_index=>"..." and :_id=>"..."), then fingerprint (orig_index+orig_id)
#   Fallback: if parsing fails, fingerprint a richer seed (reason + path + case + host)
#             and tag the event with "dlq_fallback_id"
# ------------------------------------------------------------

input {
  dead_letter_queue {
    path           => "/var/lib/recursive-ir/logstash/dead_letter_queue"
    pipeline_id    => "output"
    commit_offsets => true
  }
}

filter {
  mutate {
    add_tag => ["from_dead_letter_queue","ingestion_error"]
    add_field => {
      "source_type"   => "ingestion-error"
      "event.dataset" => "logstash.dlq"
    }
  }

  # Extract DLQ metadata into [dlq] and drop the raw internal object
  ruby {
    code => '
      md = event.get("[dead_letter_queue]") || event.get("[@metadata][dead_letter_queue]") || {}
      if md.is_a?(Hash) && !md.empty?
        %w[reason plugin_id plugin_type pipeline_id index generation offset entry_time].each do |k|
          v = md[k]
          event.set("[dlq][#{k}]", v) unless v.nil?
        end
      else
        event.tag("dlq_meta_missing")
      end

      # Clean up any raw copy if present
      event.remove("[dead_letter_queue]")
    '
  }

  # Parse dlq.reason into structured fields for easier triage
  # ALSO extract orig_index + orig_id from the embedded bulk action snippet.
  ruby {
    code => '
      reason = event.get("[dlq][reason]")
      unless reason.is_a?(String)
        return
      end

      # Extract failing field name
      if reason =~ /failed to parse field \[(?<field>[^\]]+)\]/
        event.set("[dlq][error_field]", $~[:field])
      end

      # Extract OpenSearch error type: "type\"=>\"mapper_parsing_exception\""
      if reason =~ /\"type\"=>\"(?<etype>[^\"]+)\"/
        event.set("[dlq][error_type]", $~[:etype])
      end

      # Extract inner error reason message if present: \"reason\"=>\"...\"
      if reason =~ /\"reason\"=>\"(?<emsg>[^\"]+)\"/
        event.set("[dlq][error_message]", $~[:emsg])
      end

      # Extract ORIGINAL target index and document id from the action snippet
      # Example fragment:
      #   {:_id=>"7956...", :_index=>"hayabusajson-2026.01", :routing=>nil}
      if reason =~ /:_index=>\"(?<idx>[^\"]+)\"/
        event.set("[dlq][orig_index]", $~[:idx])
      end
      if reason =~ /:_id=>\"(?<id>[^\"]+)\"/
        event.set("[dlq][orig_id]", $~[:id])
      end

      # Build a short human-friendly summary
      ef = event.get("[dlq][error_field]")
      et = event.get("[dlq][error_type]")
      em = event.get("[dlq][error_message]")

      parts = []
      parts << et if et
      parts << ef if ef
      parts << em if em
      unless parts.empty?
        event.set("[dlq][summary]", parts.join(" : "))
      end
    '
  }

  # ------------------------------------------------------------------
  # Deterministic doc_id for ingestion-error docs
  # Primary: original failed target index+id
  # Fallback: richer seed + tag so it's visible in OSD
  # ------------------------------------------------------------------
  if [dlq][orig_index] and [dlq][orig_id] {
    fingerprint {
      source => [
        "[dlq][orig_index]",
        "[dlq][orig_id]"
      ]
      concatenate_sources => true
      method  => "SHA256"
      key     => "recursive-ir"
      target  => "[@metadata][doc_id]"
    }
  } else if [dlq][reason] {
    mutate { add_tag => ["dlq_fallback_id"] }
    fingerprint {
      source => [
        "[dlq][reason]",
        "[log][file][path]",
        "[case_id]",
        "[host_ip]"
      ]
      concatenate_sources => true
      method  => "SHA256"
      key     => "recursive-ir"
      target  => "[@metadata][doc_id]"
    }
  }

  # Make the deterministic _id visible/searchable/exportable in OSD
  if [@metadata][doc_id] {
    mutate {
      add_field => {
        "document_id" => "%{[@metadata][doc_id]}"
      }
    }
  }

  # Optional: human-readable identity string (useful in OSD)
  if [dlq][orig_index] and [dlq][orig_id] and ![dlq][identity] {
    mutate {
      add_field => {
        "[dlq][identity]" => "%{[dlq][orig_index]}/%{[dlq][orig_id]}"
      }
    }
  }

  # Remove heavy/raw fields you don’t want in the DLQ index
  mutate {
    remove_field => [
      "[message]",
      "[event][original]"
    ]
  }

  # Drop big ECS trees (safe if missing)
  mutate {
    remove_field => [
      "[event]",
      "[host]",
      "[process]",
      "[source]",
      "[destination]",
      "[client]",
      "[server]",
      "[user]",
      "[file]",
      "[registry]",
      "[dll]",
      "[network]",
      "[service]",
      "[observer]",
      "[agent]",
      "[cloud]",
      "[orchestrator]",
      "[container]",
      "[url]",
      "[http]",
      "[dns]",
      "[tls]",
      "[related]",
      "[rule]",
      "[organization]",
      "[winlog]",
      "[Event]",
      "[ExtraFieldInfo]",
      "[Details]"
    ]
  }

  prune {
    whitelist_names => [
      "^@timestamp$",
      "^case_id$",
      "^source_type$",
      "^host_ip$",
      "^tags$",
      "^document_id$",
      "^log$",
      "^log\\.file$",
      "^log\\.file\\.path$",
      "^dlq($|\\.)"
    ]
  }

  # ------------------------------------------------------------
  # Force @timestamp to DLQ ingestion/triage time ("now")
  # (keeps OSD default time ranges useful)
  # ------------------------------------------------------------
  ruby {
    code => '
      orig_ts = event.get("@timestamp")
      event.set("[dlq][original_timestamp]", orig_ts) if orig_ts
      event.set("@timestamp", LogStash::Timestamp.new(Time.now.utc))
    '
  }
}

output {
  opensearch {
    hosts             => [ "${OS_HOST}" ]
    user              => "${OS_USER}"
    password          => "${OS_PASS}"
    ecs_compatibility => v1
    index             => "ingestion-error-%{+YYYY.MM}"
    document_id       => "%{[@metadata][doc_id]}"
    ssl               => true
    cacert            => "${OS_CACERT}"
    manage_template   => false
    timeout           => 60
  }

  # stdout { codec => rubydebug }  # optional for local debugging
}

