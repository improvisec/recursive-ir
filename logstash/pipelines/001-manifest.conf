input { pipeline { address => "manifest" } }

filter {
  # Filebeat ndjson already put fields at root:
  # timestamp, relative_path, size_bytes, sha256

  # Use the manifest's timestamp as @timestamp
  if [timestamp] {
    date {
      match  => ["timestamp","ISO8601"]
      target => "@timestamp"
    }
  }

  mutate {
    convert => { "size_bytes" => "integer" }
  }

  # Defensive case_id from file path if missing
  if ![case_id] and [log][file][path] {
    grok {
      match => { "[log][file][path]" => "/cases/(?<case_id>[^/]+)/" }
      tag_on_failure => []
    }
  }

  ######################################################################
  # Decide destination index & source_type by source file path
  ######################################################################
  if [log][file][path] =~ "/cases/[^/]+/case_manifest\.json$" {
    mutate {
      replace => { "source_type" => "case-manifest" }
      add_field => { "[@metadata][target_index]" => "case-manifest-%{+YYYY.MM}" }
    }
  } else if [log][file][path] =~ "/cases/[^/]+/hosts/[^/]+/host_manifest\.json$" {
    mutate {
      replace => { "source_type" => "host-manifest" }
      add_field => { "[@metadata][target_index]" => "host-manifest-%{+YYYY.MM}" }
    }
  } else if [log][file][path] =~ "/cases/[^/]+/hosts/[^/]+/artefacts_manifest\.jsonl$" {
    mutate {
      replace => { "source_type" => "artefacts-manifest" }
      add_field => { "[@metadata][target_index]" => "artefacts-manifest-%{+YYYY.MM}" }
    }
  }

  ######################################################################
  # 3) Light cleanup
  ######################################################################
  mutate {
    remove_field => [
      "@version",
      "[agent]",
      "[ecs]",
      "[input]",
      "[log][offset]",
      "[log][file][inode]",
      "[log][file][device_id]",
      "[tags]"
    ]
  }




}

output { pipeline { send_to => "output" } }

