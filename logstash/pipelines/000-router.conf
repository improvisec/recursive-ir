# /etc/recursive-ir/logstash/pipelines/000-router.conf
input {
  beats {
    port => 15044
    # keep plain; Filebeat already parsed JSON where applicable
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  # Ensure event.original exists for ALL sources that still have message
  if ![event][original] and [message] {
    mutate { copy => { "message" => "[event][original]" } }
  }

  # Default assumption: ingestion timestamp
  if ![timestamp_desc] {
    mutate { add_field => { "timestamp_desc" => "ingestion time" } }
  }

  # Run Dissector ONLY for jsonified artefacts; skip manifests
  if [log][file][path] and [log][file][path] =~ /\/jsonified_artefacts\// {
    dissect {
      mapping => {
        "[log][file][path]" =>
          "/var/log/recursive-ir/cases/%{[case_id]}/hosts/%{[host_ip]}/jsonified_artefacts/%{?atype}/%{?fname}"
      }
      tag_on_failure => []
    }
  }
  # ------------------------------------------------------------
  # NEW: enrich from case_manifest.json (per-case, cached in memory)
  # ------------------------------------------------------------
  ruby {
    init => '
      require "json"
      # Per-worker cache: { "dfir-0000" => manifest_hash }
      @@case_meta ||= {}
    '
    code => '
      cid = event.get("case_id")
      # Only proceed if we have a case_id
      return unless cid.is_a?(String) && !cid.empty?

      meta = @@case_meta[cid]

      # Lazy-load manifest for this case if not seen yet
      if meta.nil?
        path = "/var/log/recursive-ir/cases/#{cid}/case_manifest.json"
        begin
          data = File.read(path)
          obj  = JSON.parse(data) rescue nil

          if obj && obj["case_id"] == cid
            meta = obj
            @@case_meta[cid] = meta
            @logger.info("Loaded case manifest for case_id",
              :case_id => cid, :path => path)
          else
            @logger.warn("Invalid or mismatched case_manifest.json",
              :case_id => cid, :path => path)
          end
        rescue => e
          @logger.warn("Failed to load case_manifest.json",
            :case_id => cid, :path => path, :error => e.message)
        end
      end

      # If still no meta, nothing to attach
      return unless meta

      # Attach as flat fields (no [case_meta] object)
      if meta["timezones"].is_a?(Array) && event.get("timezones").nil?
        event.set("timezones", meta["timezones"])
      end

      if meta["customer_id"] && event.get("customer_id").nil?
        event.set("customer_id", meta["customer_id"])
      end

      if meta["customer_name"] && event.get("customer_name").nil?
        event.set("customer_name", meta["customer_name"])
      end
    '
  }

  # ------------------------------------------------------------

  # -------------------- PATCH: manifest-specific vs generic fingerprint --------------------
  if [source_type] in ["manifest","artefacts-manifest"] {
    fingerprint {
      source => [
        "[case_id]",
        "[host_ip]",
        "[artefact_type]",
        "[original_filename]",
        "[sha256]",
        "[md5]",
        "[size_bytes]"
      ]
      concatenate_sources => true
      method  => "SHA256"
      key     => "recursive-ir"
      target  => "[@metadata][doc_id]"
    }
  } else {
    fingerprint {
      source => [
        "[case_id]",
        "[host][name]",
        "[host][hostname]",
        "[host_ip]",
        "[log][file][path]",
        "[event][original]"
      ]
      concatenate_sources => true
      method  => "SHA256"
      key     => "recursive-ir"
      target  => "[@metadata][doc_id]"
    }
  }
  # ----------------------------------------------------------------------------------------

  mutate {
    remove_field => [
      "[agent]",
      "[host][name]",
      "[ecs]",
      "[input]",
      "[log][file][device_id]",
      "[log][file][fingerprint]",
      "[log][file][inode]",
      "[log][offset]",
      "@version",
      "[message]"
    ]
    remove_tag => ["beats_input_codec_plain_applied", "beats_input_raw_event"]
  }
}

output {
  if [source_type] in ["manifest","artefacts-manifest"] {
    pipeline { send_to => "manifest" }
  }
  else if [source_type] == "evtxjson" { pipeline { send_to => "evtxjson" } }
  else if [source_type] == "hayabusajson" { pipeline { send_to => "hayabusajson" } }
  else if [source_type] == "mftjson" { pipeline { send_to => "mftjson" } }
  else if [source_type] == "plasojson" { pipeline { send_to => "plasojson" } }
  else if [source_type] == "dissect-evtxjson" { pipeline { send_to => "dissect-evtxjson" } }
  else if [source_type] == "json-arrayjson" { pipeline { send_to => "json-arrayjson" } }
}

