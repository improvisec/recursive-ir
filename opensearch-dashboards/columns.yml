# ------------------------------------------------------------------
# Auto-generated columns config by "dfir parser new"
#
# This section controls the default columns shown in OpenSearch
# Dashboards when viewing events whose source_type-* is indicated below.
#
# Users can edit default_columns to add/remove fields they care about.
# Only columns or fields that actually exist in the index pattern will appear in
# Discover; others are dropped by OpenSearch Dashboards.
#
types:

  evtxjson:
    # Columns listed here become the initial set of columns in Discover
    # for evtxjson-*.
    default_columns: 
      - Event.System.Computer
      - Event.System.Channel
      - Event.System.Provider
      - Event.System.EventID

  hayabusajson:
    # Columns listed here become the initial set of columns in Discover
    # for hayabusajson-*.
    default_columns: 
      - Computer
      - Level
      - RuleTitle

  mftjson:
    # Columns listed here become the initial set of columns in Discover
    # for mftjson-*.
    default_columns: 
      - File_Name
      - Parent_Dir
      - Full_Path
      - is_deleted
      - is_dir
      - entry_type

  plasojson:
    # Columns listed here become the initial set of columns in Discover
    # for plasojson-*.
    default_columns: 
      - parser
      - message 

  json-arrayjson:
    # Columns listed here become the initial set of columns in Discover
    # for json-arrayjson-*.
    default_columns: []

  dissect-evtxjson:
    # Columns listed here become the initial set of columns in Discover
    # for dissect-evtxjson-*.
    default_columns: []

  nginxjson:
    # Columns listed here become the initial set of columns in Discover
    # for nginxjson-*.
    default_columns:
     - request_method
     - request_path
     - source.ip
     - source.geo.country_name

  linuxfsjson:
    # Columns listed here become the initial set of columns in Discover
    # for linuxfsjson-*.
    default_columns: []

  cloudtrailjson:
    # Columns listed here become the initial set of columns in Discover
    # for cloudtrailjson-*.
    default_columns: 
     - eventName
     - userIdentity.accessKeyId
     - resources.ARN

