events {}

http {
  server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    location = /__nginx_conf_ok {
      return 200 "nginx config loaded ok\n";
    }

    # ------------------------------------------------------------
    # Recursive-IR API
    # ------------------------------------------------------------
    location ^~ /recursive-ir/api/ {
      proxy_pass http://127.0.0.1:8000/;
      proxy_http_version 1.1;

      proxy_set_header Cookie $http_cookie;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Original-URI $request_uri;
    }

    # ------------------------------------------------------------
    # Recursive-IR Enrichment UI entrypoint
    # - allows opening /recursive-ir/enrich?case_id=...&index=...&id=...
    # - query string is preserved automatically
    # ------------------------------------------------------------
    location = /recursive-ir/enrich {
      return 302 /recursive-ir/enrich/;
    }

    location ^~ /recursive-ir/enrich/ {
      proxy_pass http://127.0.0.1:8081/enrich;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------
    # Recursive-IR UI (general)
    # ------------------------------------------------------------
    location = /recursive-ir {
      return 302 /recursive-ir/;
    }

    location ^~ /recursive-ir/ {
      proxy_pass http://127.0.0.1:8081/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------
    # OpenSearch Dashboards (loopback)
    # ------------------------------------------------------------
    location / {
      proxy_pass http://127.0.0.1:5601;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
