- type: filestream
  id: plaso-jsonl
  enabled: true
  paths:
    - /var/log/recursive-ir/cases/*/hosts/*/jsonified_artefacts/plaso/**/*.jsonl
  include_files: ['\\.jsonl$']
  exclude_files:
    - '\\.tmp'           # ignore temp files
    - '~$'                 # ignore editor temps

  fields:
    source_type: plasojson
  fields_under_root: true
  ignore_older: 0

  processors:
    # 1) keep the raw line
    - copy_fields:
        fields:
          - from: message
            to: event.original
        fail_on_error: false

    # 2) parse JSON from message into root
    - decode_json_fields:
        fields: ["message"]
        target: ""
        overwrite_keys: true
        add_error_key: true

